<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chatbot YouPass 1984</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #f0f2f5; height: 100vh; display: flex; flex-direction: column;
  }
  header {
    background: #1a73e8; color: #fff; padding: 14px 20px;
    font-weight: 600; font-size: 17px; display: flex; align-items: center; gap: 10px;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: #34d399; }
  #chat {
    flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .msg { max-width: 75%; padding: 11px 15px; border-radius: 16px; line-height: 1.5;
    white-space: pre-wrap; word-wrap: break-word; font-size: 15px; }
  .user { align-self: flex-end; background: #1a73e8; color: #fff; border-bottom-right-radius: 4px; }
  .bot  { align-self: flex-start; background: #fff; color: #1f2937; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .bot.typing { color: #9ca3af; font-style: italic; }
  footer { padding: 14px 20px; background: #fff; border-top: 1px solid #e5e7eb;
    display: flex; gap: 10px; }
  #input { flex: 1; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 24px;
    font-size: 15px; outline: none; resize: none; max-height: 120px; font-family: inherit; }
  #input:focus { border-color: #1a73e8; }
  #send { background: #1a73e8; color: #fff; border: none; border-radius: 24px;
    padding: 0 22px; font-size: 15px; font-weight: 600; cursor: pointer; }
  #send:disabled { background: #9cb8e8; cursor: not-allowed; }
  .meta { align-self: center; font-size: 12px; color: #9ca3af; }
</style>
</head>
<body>
  <header><span class="dot"></span> Chatbot YouPass 1984</header>
  <div id="chat">
    <div class="meta">Xin chào! Hỏi gì cũng được nhé.</div>
  </div>
  <footer>
    <textarea id="input" rows="1" placeholder="Nhập câu hỏi... (Enter để gửi, Shift+Enter xuống dòng)"></textarea>
    <button id="send">Gửi</button>
  </footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

// Một conversation_id duy nhất cho cả phiên -> bot nhớ ngữ cảnh hội thoại.
const conversationId = crypto.randomUUID();

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;
  input.value = ''; input.style.height = 'auto';
  sendBtn.disabled = true;

  addMsg(message, 'user');
  const botDiv = addMsg('Đang trả lời…', 'bot typing');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, conversation_id: conversationId }),
    });

    // Đọc stream SSE: mỗi dòng "data: {json}". type=content -> nối text, type=done -> kết thúc.
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', answer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop(); // phần dở dang giữ lại
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }
        if (evt.type === 'content' && evt.text) {
          answer += evt.text;
          botDiv.textContent = answer;
          botDiv.classList.remove('typing');
          chat.scrollTop = chat.scrollHeight;
        }
      }
    }
    if (!answer) { botDiv.textContent = '(Không nhận được nội dung — token có thể đã hết hạn)'; }
  } catch (e) {
    botDiv.textContent = 'Lỗi: ' + e.message;
    botDiv.classList.remove('typing');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

sendBtn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
